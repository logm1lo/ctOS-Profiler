name: ctos
description: A unofficial Watch Dogs ctOS face recognition app reimagined.
version: 1.0.1+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5
  face_detection_tflite: ^5.0.13
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9
  image: ^4.1.3
  image_picker: ^1.0.7
  path: ^1.8.3
  file_picker: ^8.0.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/facenet.tflite
    - assets/models/mobile_face_net.tflite
